{% extends "base.html" %}

{% block content %}

<style>

body{
font-family:'Inter',sans-serif;
background:#f5f7fb;
}

.categories-hero{
background:linear-gradient(135deg,#667eea,#764ba2);
padding:90px 40px 70px;
text-align:center;
color:white;
}

.categories-hero h1{
font-size:2.5rem;
margin-bottom:10px;
}

.categories-grid{
max-width:1100px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:20px;
}

.category-card{
background:white;
border-radius:15px;
padding:30px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.category-card:hover{
transform:translateY(-8px);
box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

.category-card h3{
margin-bottom:20px;
font-size:20px;
color:#333;
}

.btn-category{
background:#6c63ff;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.btn-category:hover{
background:#5147d8;
}

</style>

<section class="categories-hero">
<h1>{{event.name}} Categories</h1>
<p>Select a category to register</p>
</section>

<div class="categories-grid">

{% for c in categories %}

<div class="category-card">

<h3>{{c.category_name}}</h3>

<a href="/register/{{c.id}}">
<button class="btn-category">Register</button>
</a>

</div>

{% endfor %}

</div>

{% endblock %}

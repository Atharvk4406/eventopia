{% extends "base.html" %}

{% block content %}
<style>

body{
background:linear-gradient(135deg,#667eea,#764ba2);
font-family:Arial;
margin:0;
padding:0;
}

.login-wrapper{
display:flex;
justify-content:center;
align-items:center;
min-height:80vh;
}

.login-box{
background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

.login-box button{
width:100%;
padding:12px;
background:#6c63ff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.login-box button:hover{
background:#5147d8;
}

</style>

<div class="login-wrapper">

<div class="login-box">

<h2>Admin Login</h2>

<form method="POST">

<input type="email" name="email" placeholder="Admin Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</div>

{% endblock %}
